<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon - Pharmacy Scholar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:#00151b;
      --navy-2:#002b36;
      --gold:#d7b14b;
      --bg:#f8f9fa;
      --card:#ffffff;
      --muted:#5f6b70;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Manrope', sans-serif;
      background: radial-gradient(circle at top right, rgba(215,177,75,0.18), transparent 25%), linear-gradient(135deg, var(--bg), #eef2f4);
      color: var(--navy);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(900px, 100%);
      background: rgba(255,255,255,0.84);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0,21,27,0.08);
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(0,21,27,0.08);
      padding: 40px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      background: rgba(215,177,75,0.12);
      color: #7b5a00;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    h1 {
      font-size: clamp(2rem, 4vw, 3.5rem);
      margin: 18px 0 10px;
      line-height: 1.05;
    }
    p {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
      max-width: 62ch;
    }
    .actions, .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }
    .btn {
      text-decoration: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 700;
      transition: transform .18s ease, opacity .18s ease;
      border: 1px solid rgba(0,21,27,0.08);
    }
    .btn:hover { transform: translateY(-1px); opacity: .95; }
    .btn.primary { background: var(--navy); color: white; }
    .btn.secondary { background: white; color: var(--navy); }
    .links a {
      text-decoration: none;
      color: var(--navy);
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(0,21,27,0.08);
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">Section Placeholder</div>
    <h1 data-coming-soon-title>Module</h1>
    <p data-coming-soon-subtitle>This section is ready to be connected next. For now, the rest of the uploaded pages are linked together so you can move through the site and keep building from the same visual direction.</p>

    <div class="actions">
      <a class="btn primary" href="index.html">Back to Home</a>
      <a class="btn secondary" href="subjects.html">Open Subjects</a>
    </div>

    <div class="links" data-quick-links></div>
  </main>
  <script src="assets/site-router.js"></script>
</body>
</html>
